name: Proxy Tests

on:
  push:
    branches: [main]
    paths:
      - 'images/proxy/**'
      - '.github/workflows/proxy-tests.yml'
  pull_request:
    paths:
      - 'images/proxy/**'
      - '.github/workflows/proxy-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install PyYAML mitmproxy

      - name: Run proxy unit tests
        run: python -m unittest discover -s images/proxy/tests -t images/proxy/tests -p 'test_*.py'

      - name: Run proxy integration tests
        run: python -m unittest discover -s images/proxy/tests/integration -t images/proxy/tests -p 'test_*.py'
