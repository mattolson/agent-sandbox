name: Check Hermes Agent Version

on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 13 UTC (offset from OpenCode at 12)
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-sandbox-hermes

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write  # Needed to trigger workflows

    steps:
      - name: Resolve latest Hermes release from GitHub
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Image tags track upstream's calver git tag (e.g. v2026.6.5 ->
          # hermes-2026.6.5), not the PyPI semver. PyPI exposes no link to the
          # tag, so GitHub releases are the source of truth.
          REF=$(gh api repos/NousResearch/hermes-agent/releases/latest --jq .tag_name)
          if [ -z "$REF" ] || [ "$REF" = "null" ]; then
            echo "Failed to resolve Hermes release tag from GitHub"
            exit 1
          fi
          CALVER=${REF#v}
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "calver=$CALVER" >> $GITHUB_OUTPUT
          echo "Latest Hermes release: $REF (image tag hermes-$CALVER)"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version tag exists in registry
        id: check
        run: |
          TAG="hermes-${{ steps.release.outputs.calver }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

          # Use docker manifest inspect to check if tag exists (no pull required)
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Tag $TAG already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Trigger image rebuild
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering build-images workflow for hermes-agent ${{ steps.release.outputs.ref }}..."
          gh workflow run build-images.yml --repo ${{ github.repository }}

      - name: Summary
        run: |
          echo "## Hermes Agent Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Latest release | ${{ steps.release.outputs.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag exists | ${{ steps.check.outputs.exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rebuild triggered | ${{ steps.check.outputs.exists == 'false' }} |" >> $GITHUB_STEP_SUMMARY
