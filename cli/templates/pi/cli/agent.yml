# Managed by agentbox.
# Re-run `agentbox init` or `agentbox switch --agent <name>` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.pi.override.yml instead.
services:
  proxy:
    volumes: []
  agent:
    image: ghcr.io/mattolson/agent-sandbox-pi:latest
    volumes:
      # Persist Pi config, credentials, and sessions
      - pi-state:/home/dev/.pi
      # Persist shell history
      - pi-history:/commandhistory
volumes:
  pi-state:
  pi-history:
