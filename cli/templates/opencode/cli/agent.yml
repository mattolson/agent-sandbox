# Managed by agentbox.
# Re-run `agentbox init` or `agentbox switch --agent <name>` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.opencode.override.yml instead.
services:
  proxy:
    volumes: []
  agent:
    image: ghcr.io/mattolson/agent-sandbox-opencode:latest
    volumes:
      # Persist OpenCode config, permissions, and opentui state
      - opencode-config:/home/dev/.config
      - opencode-local-share:/home/dev/.local/share
      - opencode-local-state:/home/dev/.local/state
      # Persist shell history
      - opencode-history:/commandhistory
volumes:
  opencode-config:
  opencode-local-share:
  opencode-local-state:
  opencode-history:
