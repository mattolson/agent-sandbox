# Managed by agentbox.
# Re-run `agentbox init` or `agentbox switch --agent <name>` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.gemini.override.yml instead.
services:
  proxy:
    volumes: []
  agent:
    image: ghcr.io/mattolson/agent-sandbox-gemini:latest
    volumes:
      # Persist Gemini credentials
      - gemini-state:/home/dev/.gemini
      # Persist shell history
      - gemini-history:/commandhistory
volumes:
  gemini-state:
  gemini-history:
