# Shared user-owned policy additions for layered agentbox sandboxes.
#
# This file is merged into the active agent baseline at proxy startup.
# Apply edits without restarting: agentbox proxy reload
#
# See docs/policy/schema.md for the full format reference.

services: []
domains: []

