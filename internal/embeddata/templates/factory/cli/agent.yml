# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.factory.override.yml instead.
services:
  proxy:
    volumes: []
  agent:
    image: ghcr.io/mattolson/agent-sandbox-factory:latest
    volumes:
      # Persist Factory config and credentials
      - factory-state:/home/dev/.factory
      # Persist shell history
      - factory-history:/commandhistory
volumes:
  factory-state:
  factory-history:
