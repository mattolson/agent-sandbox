# Managed by agentbox.
# Re-run `agentbox init` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml instead.
services:
  proxy:
    image: ghcr.io/mattolson/agent-sandbox-proxy:latest
    cap_drop:
      - ALL
    environment:
      - PROXY_MODE=enforce
    volumes:
      - proxy-state:/home/mitmproxy/.mitmproxy
      - proxy-ca:/ca-export
      - proxy-credential-shims:/run/agentbox/credential-shims
      - type: bind
        source: ${AGENTBOX_SECRET_DIR:-${HOME}/.config/agent-sandbox/secrets}
        target: /run/secrets/agentbox
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8080" ]
      interval: 5s
      timeout: 3s
      retries: 3
  agent:
    depends_on:
      proxy:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      # iptables firewall rule management (init-firewall.sh)
      - NET_ADMIN
      # Raw socket access for iptables (init-firewall.sh)
      - NET_RAW
      # sudo to run init scripts as root (sudoers restricts to specific scripts)
      - SETUID
      - SETGID
    volumes:
      # Project workspace
      - type: bind
        source: ../..
        target: /workspace
        bind:
          create_host_path: false
      # Read-only policy directory
      - type: bind
        source: ..
        target: /workspace/.agent-sandbox
        read_only: true
        bind:
          create_host_path: false
      # Proxy CA certificate (public cert only, no private key)
      - proxy-ca:/etc/mitmproxy:ro
      # Agent-visible credential shim files generated by the proxy
      - proxy-credential-shims:/run/agentbox/credential-shims:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      # Disable HTTP/2 in Go clients (gh CLI) to avoid header validation issues through proxy
      - GODEBUG=http2client=0
volumes:
  proxy-state:
  proxy-ca:
  proxy-credential-shims:
