# Agent sandbox network policy
#
# Domains allowed through the proxy. All other traffic is blocked with 403.
# Apply edits without restarting: agentbox proxy reload
#
# See docs/policy/schema.md for the full format reference.

# Services allowed through the proxy.
# See images/proxy/service_catalog.py for definitions. Plain-string entries
# allow a service's default hosts. Mapping entries can narrow expansion; see
# docs/policy/schema.md for the rich authored shape.
services: []

# Additional hosts allowed through the proxy.
# Rich entries can carry request-aware rules, for example:
# domains:
#   - host: api.github.com
#     rules:
#       - scheme: https
#         method: get
#         path:
#           prefix: /repos/example/
domains: []
