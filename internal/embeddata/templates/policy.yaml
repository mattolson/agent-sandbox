# Agent sandbox network policy
#
# Domains allowed through the proxy. All other traffic is blocked with 403.
# Changes take effect on proxy restart: agentbox compose restart proxy
#
# See docs/policy/schema.md for the full format reference.

# Services allowed through the proxy.
# See images/proxy/render-policy for definitions.
services: []

# Additional hosts allowed through the proxy.
# Rich entries can carry request-aware rules, for example:
# domains:
#   - host: api.github.com
#     rules:
#       - scheme: https
#         method: get
#         path:
#           prefix: /repos/example/
domains: []
