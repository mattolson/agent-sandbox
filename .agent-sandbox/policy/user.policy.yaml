# Shared user-owned policy additions for layered agentbox sandboxes.
#
# This file is merged into the active agent baseline at proxy startup.
# Changes take effect on proxy restart: agentbox compose restart proxy
#
# See docs/policy/schema.md for the full format reference.

services:
  - name: github
    repos:
      - mattolson/agent-sandbox
    git:
      access: readwrite
      auth:
        secret: github.agent-sandbox.push-token
        client_shim:
          kind: git-askpass
domains:
  - raw.githubusercontent.com
  - mcp.linear.app
  - proxy.golang.org
  - sum.golang.org
