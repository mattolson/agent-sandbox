# Managed by agentbox.
# Re-run `agentbox init` or `agentbox switch --agent <name>` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.claude.override.yml instead.
services:
  proxy:
    volumes:
      - type: bind
        source: ../policy/user.agent.claude.policy.yaml
        target: /etc/agent-sandbox/policy/user.agent.policy.yaml
        read_only: true
        bind:
          create_host_path: false
    environment:
      - AGENTBOX_ACTIVE_AGENT=claude
  agent:
    image: ghcr.io/mattolson/agent-sandbox-claude@sha256:09182e0bb1744a52df1f0ab2ad6b0d2971d09291b45117a53377b810612b5eae
    volumes:
      - claude-state:/home/dev/.claude
      - claude-history:/commandhistory
    environment:
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
volumes:
  claude-state:
  claude-history:
