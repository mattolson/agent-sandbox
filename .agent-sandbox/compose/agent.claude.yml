# Managed by agentbox.
# Re-run `agentbox init` or `agentbox switch --agent <name>` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml or user.agent.claude.override.yml instead.
services:
  proxy:
    volumes:
      - ../policy/user.agent.claude.policy.yaml:/etc/agent-sandbox/policy/user.agent.policy.yaml:ro
    environment:
      - AGENTBOX_ACTIVE_AGENT=claude
  agent:
    image: ghcr.io/mattolson/agent-sandbox-claude@sha256:6e91fc7014b978c9085ec363a8ed9971e1058110942672ebcf3ec89f043aa9fa
    volumes:
      # Persist Claude credentials
      - claude-state:/home/dev/.claude
      # Persist shell history
      - claude-history:/commandhistory
    environment:
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
volumes:
  claude-state:
  claude-history:
