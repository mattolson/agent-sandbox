# Managed by agentbox.
# Re-run `agentbox init` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml instead.
name: agent-sandbox
services:
  proxy:
    image: ghcr.io/mattolson/agent-sandbox-proxy@sha256:05220196365213943f81116ae6e727bc54a48d3f302b8cbee9e49cb3bb7f62c6
    cap_drop:
      - ALL
    volumes:
      - proxy-state:/home/mitmproxy/.mitmproxy
      - proxy-ca:/ca-export
      - type: bind
        source: ../policy/user.policy.yaml
        target: /etc/agent-sandbox/policy/user.policy.yaml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${AGENTBOX_SECRET_DIR:-${HOME}/.config/agent-sandbox/secrets}
        target: /run/secrets/agentbox
        read_only: true
        bind:
          create_host_path: false
      - proxy-credential-shims:/run/agentbox/credential-shims
    environment:
      - PROXY_MODE=enforce
    healthcheck:
      test:
        - CMD
        - nc
        - -z
        - localhost
        - "8080"
      interval: 5s
      timeout: 3s
      retries: 3
  agent:
    depends_on:
      proxy:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
    volumes:
      - ../..:/workspace
      - ..:/workspace/.agent-sandbox:ro
      - proxy-ca:/etc/mitmproxy:ro
      - proxy-credential-shims:/run/agentbox/credential-shims:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      - GODEBUG=http2client=0
volumes:
  proxy-state:
  proxy-ca:
  proxy-credential-shims:
