# Managed by agentbox.
# Re-run `agentbox init` to regenerate this file.
# Do not edit this file directly. Use .agent-sandbox/compose/user.override.yml instead.
name: agent-sandbox
services:
  proxy:
    image: ghcr.io/mattolson/agent-sandbox-proxy@sha256:7c13a98060e0bf4d0c3587a4be27f0eb1bab62bebd56e08499c4f10aad4f1928
    cap_drop:
      - ALL
    volumes:
      - proxy-state:/home/mitmproxy/.mitmproxy
      - proxy-ca:/ca-export
      - ../policy/user.policy.yaml:/etc/agent-sandbox/policy/user.policy.yaml:ro
    environment:
      - PROXY_MODE=enforce
    healthcheck:
      test:
        - CMD
        - nc
        - -z
        - localhost
        - "8080"
      interval: 5s
      timeout: 3s
      retries: 3
  agent:
    depends_on:
      proxy:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
    volumes:
      - ../..:/workspace
      - ..:/workspace/.agent-sandbox:ro
      - proxy-ca:/etc/mitmproxy:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      - GODEBUG=http2client=0
volumes:
  proxy-state:
  proxy-ca:
