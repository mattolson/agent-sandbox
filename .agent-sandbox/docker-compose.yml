# Agent Sandbox dev environment
name: agent-sandbox
services:
  proxy:
    image: ghcr.io/mattolson/agent-sandbox-proxy@sha256:37adc675abea828fb061ba183d898d6781f560da85d74327405a9bd7711b0720
    #image: agent-sandbox-proxy:local
    cap_drop:
      - ALL
    environment:
      - PROXY_MODE=enforce
    volumes:
      - proxy-state:/home/mitmproxy/.mitmproxy
      - proxy-ca:/ca-export
      - ../.agent-sandbox/policy-cli-codex.yaml:/etc/mitmproxy/policy.yaml:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 5s
      timeout: 3s
      retries: 3
  agent:
    image: ghcr.io/mattolson/agent-sandbox-codex@sha256:017d175e811e1e8f1e4609e11d320b9bdc2483015b6880509f997aa5077d9cbd
    #image: agent-sandbox-codex:local
    depends_on:
      proxy:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      # iptables firewall rule management (init-firewall.sh)
      - NET_ADMIN
      # Raw socket access for iptables (init-firewall.sh)
      - NET_RAW
      # sudo to run init scripts as root (sudoers restricts to specific scripts)
      - SETUID
      - SETGID
    volumes:
      # Project workspace
      - ..:/workspace
      # Read-only policy directory
      - ../.agent-sandbox:/workspace/.agent-sandbox:ro
      # Persist Codex config and credentials
      - codex-state:/home/dev/.codex
      # Persist shell history
      - codex-history:/commandhistory
      # Proxy CA certificate (public cert only, no private key)
      - proxy-ca:/etc/mitmproxy:ro
      # Shell customizations (optional - scripts sourced at shell startup)
      - ${HOME}/.config/agent-sandbox/shell.d:/home/dev/.config/agent-sandbox/shell.d:ro
      # Dotfiles (optional - auto-linked into $HOME at startup)
      - ${HOME}/.config/agent-sandbox/dotfiles:/home/dev/.dotfiles:ro
      # Read-only Git directory
      # - ../.git:/workspace/.git:ro
      # Read-only IntelliJ IDEA project directory
      # - ../.idea:/workspace/.idea:ro
      # Read-only VS Code project directory
      # - ../.vscode:/workspace/.vscode:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,proxy
      # Disable HTTP/2 in Go clients (gh CLI) to avoid header validation issues through proxy
      - GODEBUG=http2client=0
volumes:
  codex-state:
  codex-history:
  proxy-state:
  proxy-ca:
